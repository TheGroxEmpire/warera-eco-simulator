services:
  web:
    image: warera-eco-simulator:local
    build: .
    ports:
      - "${WEB_PUBLISHED_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/eco-simulator/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  test:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app:ro
    command: ["sh", "-c", "npm run check && npm test"]
