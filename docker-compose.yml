services:
  warera-eco-simulator:
    build: .
    container_name: warera-eco-simulator
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.warera-eco-simulator.rule=Host(`${WARERA_HOST:-warera.xorgress.com}`) && PathPrefix(`/eco-simulator`)"
      - "traefik.http.routers.warera-eco-simulator.entrypoints=https"
      - "traefik.http.routers.warera-eco-simulator.tls=true"
      - "traefik.http.routers.warera-eco-simulator.priority=100"
      - "traefik.http.services.warera-eco-simulator.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  proxy:
    external: true
